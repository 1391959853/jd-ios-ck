[policy]
static=Shawn, direct, proxy, reject
static=AdvertisingLite, direct, proxy, reject
url-latency-benchmark=一元机场, server-tag-regex=(?i)(专线|高级专线), check-interval=600, tolerance=0, alive-checking=true
# CF随机节点 - 每5分钟测试真实连接延迟，不测试下载速度
url-latency-benchmark=🌐 CloudFlare, server-tag-regex=(?i)(cloudflare|cf随机节点), check-interval=300, tolerance=50, alive-checking=true, img-url=https://raw.githubusercontent.com/Orz-3/face/master/Cloudflare.png

# 漏网之鱼策略组 - 国内直连，国外走CF随机节点
static=🐟 漏网之鱼, 🌐 CloudFlare, 一元机场, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Final.png

